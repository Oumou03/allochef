<ion-tabs>
  <ion-tab-bar slot="bottom" color="light">
    <ion-tab-button tab="tab1" href="/tabs/tab1" *ngIf="!isAdmin">
      <ion-icon name="home-outline"></ion-icon>
      <ion-label>Accueil</ion-label>
    </ion-tab-button>

    <ion-tab-button *ngIf="!isChef && !isAdmin" tab="tab2" href="/tabs/tab2">
      <ion-icon name="search-outline"></ion-icon>
      <ion-label>Recherche</ion-label>
    </ion-tab-button>

    <ion-tab-button *ngIf="!isChef && !isAdmin" tab="tab3" href="/tabs/tab3">
      <ion-icon name="flame-outline"></ion-icon>
      <ion-label>Mes sauces</ion-label>
    </ion-tab-button>

    <ion-tab-button *ngIf="!isChef && !isAdmin" tab="tab4" href="/tabs/tab4">
      <ion-icon name="heart-outline"></ion-icon>
      <ion-label>Favoris</ion-label>
    </ion-tab-button>

    <ion-tab-button tab="tab5" href="/tabs/tab5">
      <ion-icon name="person-outline"></ion-icon>
      <ion-label>Profil</ion-label>
    </ion-tab-button>
  </ion-tab-bar>
</ion-tabs>
