<ion-content [fullscreen]="true" class="auth-content chef-theme">
  <div class="auth-container">
    <button type="button" class="back-to-home-link" (click)="goToLoginChef()">
      <ion-icon name="chevron-back-outline"></ion-icon> Connexion Chef
    </button>

    <div class="auth-header">
      <span class="auth-logo gold">Rejoindre l'Académie</span>
      <h2>Devenir Chef AlloChef</h2>
      <p>Créez votre profil professionnel pour publier des cours vidéo, recettes de sauces et bâtir votre communauté.</p>
    </div>

    <form (ngSubmit)="handleRegister()" class="auth-form">
      <div class="input-group">
        <label>Nom complet d'usage</label>
        <div class="input-wrapper">
          <ion-icon name="person-outline" class="input-icon"></ion-icon>
          <ion-input 
            type="text" 
            placeholder="Chef Diallo" 
            [(ngModel)]="name"
            name="name"
            required 
          ></ion-input>
        </div>
      </div>

      <div class="input-group">
        <label>Spécialité culinaire</label>
        <div class="input-wrapper">
          <ion-icon name="restaurant-outline" class="input-icon"></ion-icon>
          <ion-input 
            type="text" 
            placeholder="Gastronomie Africaine, Sauces Secrètes..." 
            [(ngModel)]="specialty"
            name="specialty"
            required 
          ></ion-input>
        </div>
      </div>

      <div class="input-group">
        <label>Courte Biographie (Présentation)</label>
        <div class="input-wrapper">
          <ion-icon name="book-outline" class="input-icon"></ion-icon>
          <ion-input 
            type="text" 
            placeholder="Ancien cuisinier de renom..." 
            [(ngModel)]="bio"
            name="bio"
            required 
          ></ion-input>
        </div>
      </div>

      <div class="input-group">
        <label>Adresse Email Professionnelle</label>
        <div class="input-wrapper">
          <ion-icon name="mail-outline" class="input-icon"></ion-icon>
          <ion-input 
            type="email" 
            placeholder="chef.nom@allochef.com" 
            [(ngModel)]="email"
            name="email"
            inputmode="email"
            autocomplete="email"
            required 
          ></ion-input>
        </div>
      </div>

      <div class="input-group">
        <label>Mot de passe</label>
        <div class="input-wrapper">
          <ion-icon name="lock-closed-outline" class="input-icon"></ion-icon>
          <ion-input 
            type="password" 
            placeholder="Min. 8 caractères" 
            [(ngModel)]="password"
            name="password"
            required 
          ></ion-input>
        </div>
      </div>

      <ion-button type="submit" expand="block" class="submit-btn chef-gold" [disabled]="loading">
        {{ loading ? 'Création de votre profil...' : 'Créer mon Profil Chef' }} <ion-icon name="arrow-forward" slot="end"></ion-icon>
      </ion-button>
    </form>

    <div class="auth-divider">
      <span>OU</span>
    </div>

    <ion-button fill="outline" expand="block" class="google-btn" (click)="handleGoogleRegister()" [disabled]="loading">
      <ion-icon name="logo-google" slot="start"></ion-icon> S'inscrire avec Google
    </ion-button>

    <div class="auth-footer" style="margin-top: 20px;">
      <p>Déjà enregistré ? <button type="button" class="auth-link" (click)="goToLoginChef()">Se connecter</button></p>
    </div>
  </div>
</ion-content>
